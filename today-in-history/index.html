<style>
.center {text-align:center;}
#history-container {
  max-width: 800px;
  margin: 0 auto;
  padding: 20px;
}

.history-date {
  text-align: center;
  font-size: 1.5em;
  color: #666;
  margin-bottom: 30px;
  padding-bottom: 10px;
  border-bottom: 2px solid #f0f0f0;
}

.history-item {
  padding: 15px 20px;
  margin-bottom: 10px;
  background-color: #f9f9f9;
  border-left: 4px solid #1890ff;
  border-radius: 4px;
  transition: transform 0.3s;
  list-style: none;
}

.history-item:hover {
  transform: translateX(10px);
  background-color: #f0f7ff;
}

.history-year {
  font-weight: bold;
  color: #1890ff;
  margin-right: 15px;
}

.history-event {
  color: #333;
  line-height: 1.6;
}

.loading {
  text-align: center;
  padding: 40px;
  color: #999;
}

.error {
  text-align: center;
  padding: 40px;
  color: #f56c6c;
  background-color: #fef0f0;
  border-radius: 4px;
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
  const container = document.getElementById('history-container');
  const loadingEl = document.getElementById('loading');
  const errorEl = document.getElementById('error');
  const historyList = document.getElementById('history-list');
  
  // 显示日期
  const today = new Date();
  const month = today.getMonth() + 1;
  const day = today.getDate();
  const dateTitle = document.createElement('div');
  dateTitle.className = 'history-date';
  dateTitle.textContent = `${month}月${day}日 历史上的今天`;
  container.insertBefore(dateTitle, container.firstChild);
  
  // 获取历史上的今天数据
  fetch('https://v2.xxapi.cn/api/history')
    .then(response => response.json())
    .then(data => {
      loadingEl.style.display = 'none';
      
      if (data.code === 200 && data.data && data.data.length > 0) {
        // 创建列表
        const ul = document.createElement('ul');
        ul.style.padding = '0';
        
        data.data.forEach(item => {
          const li = document.createElement('li');
          li.className = 'history-item';
          
          // 提取年份和事件
          const yearMatch = item.match(/^(\d{4}年)/);
          if (yearMatch) {
            const year = yearMatch[1];
            const event = item.substring(year.length);
            li.innerHTML = `<span class="history-year">${year}</span><span class="history-event">${event}</span>`;
          } else {
            li.textContent = item;
          }
          
          ul.appendChild(li);
        });
        
        historyList.appendChild(ul);
      } else {
        errorEl.style.display = 'block';
        errorEl.textContent = '暂无历史上的今天数据';
      }
    })
    .catch(error => {
      loadingEl.style.display = 'none';
      errorEl.style.display = 'block';
      errorEl.textContent = '加载失败，请稍后重试';
      console.error('Error:', error);
    });
});
</script>   <link rel="stylesheet" href="/css/spoiler.css" type="text/css"><script src="/js/spoiler.js" type="text/javascript" async></script>

  <script>
  var now = new Date();
  function createtime(){
      var grt= new Date("08/17/2020 00:00:00");
      now.setTime(now.getTime()+250);
      days = (now - grt ) / 1000 / 60 / 60 / 24;
      dnum = Math.floor(days);
      hours = (now - grt ) / 1000 / 60 / 60 - (24 * dnum);
      hnum = Math.floor(hours);
      if(String(hnum).length ==1 ){
          hnum = "0" + hnum;
      }
      minutes = (now - grt ) / 1000 /60 - (24 * 60 * dnum) - (60 * hnum);
      mnum = Math.floor(minutes);
      if(String(mnum).length ==1 ){
                mnum = "0" + mnum;
      }
      seconds = (now - grt ) / 1000 - (24 * 60 * 60 * dnum) - (60 * 60 * hnum) - (60 * mnum);
      snum = Math.round(seconds);
      if(String(snum).length ==1 ){
                snum = "0" + snum;
      }
      document.getElementById("timeDate").innerHTML = "🚀已持续航行&nbsp"+dnum+"&nbsp天";  
      document.getElementById("times").innerHTML = hnum + "&nbsp时&nbsp" + mnum + "&nbsp分&nbsp" + snum + "&nbsp秒";
  }
  setInterval("createtime()",250);
  </script>
